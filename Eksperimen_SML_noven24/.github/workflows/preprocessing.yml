name: Automated Data Preprocessing

on:
  push:
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_noven24.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas

    - name: Run preprocessing script
      run: |
        python preprocessing/automate_noven24.py --input namadataset_raw/dataset.csv --output preprocessing/namadataset_preprocessing/dataset_processed.csv
        
    - name: Commit and push processed data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add preprocessing/namadataset_preprocessing/dataset_processed.csv
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update processed dataset"
        git push
